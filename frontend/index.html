<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema RH COPIA GROUP</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="assets/LOGO.png" alt="COPIA GROUP">
            <h1>Sistema de Gestão de RH</h1>
            <p>Bem-vindo ao Sistema Integrado de Recursos Humanos</p>

            <div id="alertContainer"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Utilizador</label>
                    <input
                        type="text"
                        id="username"
                        class="form-control"
                        placeholder="Digite o seu username"
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        class="form-control"
                        placeholder="Digite a sua password"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">
                    Entrar
                </button>
            </form>

            <p class="mt-3 text-center" style="font-size: 12px; color: #999;">
                © 2025 COPIA GROUP OF COMPANIES S.A. Todos os direitos reservados.
            </p>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const alertContainer = document.getElementById('alertContainer');

            // Limpar alertas anteriores
            alertContainer.innerHTML = '';

            // Desabilitar botão
            loginBtn.disabled = true;
            loginBtn.textContent = 'A autenticar...';

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Guardar token e dados do utilizador
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Redirecionar baseado no role
                    if (data.user.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'user-dashboard.html';
                    }
                } else {
                    // Mostrar erro
                    alertContainer.innerHTML = `
                        <div class="alert alert-danger">
                            ${data.error || 'Erro ao fazer login'}
                        </div>
                    `;
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Entrar';
                }
            } catch (error) {
                alertContainer.innerHTML = `
                    <div class="alert alert-danger">
                        Erro de conexão com o servidor. Por favor, tente novamente.
                    </div>
                `;
                loginBtn.disabled = false;
                loginBtn.textContent = 'Entrar';
            }
        });

        // Verificar se já está autenticado
        if (localStorage.getItem('token')) {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user.role === 'admin') {
                window.location.href = 'admin-dashboard.html';
            } else {
                window.location.href = 'user-dashboard.html';
            }
        }
    </script>
</body>
</html>
