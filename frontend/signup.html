<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Sistema RH COPIA GROUP</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@vscode/codicons/dist/codicon.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="assets/LOGO.png" alt="COPIA GROUP">
            <h1>Criar Conta</h1>
            <p>Regista-te para aceder ao Sistema de RH</p>

            <div id="alertContainer"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label class="form-label" for="name">Nome Completo *</label>
                    <input
                        type="text"
                        id="name"
                        class="form-control"
                        placeholder="Ex: Maria Silva"
                        required
                        autocomplete="name"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email *</label>
                    <input
                        type="email"
                        id="email"
                        class="form-control"
                        placeholder="exemplo@copiagroup.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">Telefone (opcional)</label>
                    <input
                        type="tel"
                        id="phone"
                        class="form-control"
                        placeholder="+244 9XX XXX XXX"
                        autocomplete="tel"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password *</label>
                    <input
                        type="password"
                        id="password"
                        class="form-control"
                        placeholder="Mínimo 6 caracteres"
                        required
                        minlength="6"
                        autocomplete="new-password"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="passwordConfirm">Confirmar Password *</label>
                    <input
                        type="password"
                        id="passwordConfirm"
                        class="form-control"
                        placeholder="Repetir a password"
                        required
                        minlength="6"
                        autocomplete="new-password"
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-lg btn-block" id="signupBtn">
                    <i class="codicon codicon-person-add"></i> Criar Conta
                </button>
            </form>

            <p class="mt-2 text-center" style="font-size: 14px; color: var(--ink-500);">
                Já tens conta?
                <a href="index.html" style="color: var(--brand-600); text-decoration: none; font-weight: 500;">
                    Entrar
                </a>
            </p>

            <p class="mt-3 text-center" style="font-size: 11px; color: var(--ink-400);">
                © 2026 COPIA GROUP OF COMPANIES S.A. — As contas novas são criadas como utilizador comum.
                O acesso de administrador é atribuído pelo gestor de RH.
            </p>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        // Se ja autenticado, redireciona
        if (localStorage.getItem('token')) {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            window.location.href = user.role === 'admin' ? 'admin-dashboard.html' : 'user-dashboard.html';
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            const btn = document.getElementById('signupBtn');
            const alertContainer = document.getElementById('alertContainer');

            alertContainer.innerHTML = '';

            if (password !== passwordConfirm) {
                alertContainer.innerHTML = `<div class="alert alert-danger">As passwords não coincidem.</div>`;
                return;
            }
            if (password.length < 6) {
                alertContainer.innerHTML = `<div class="alert alert-danger">A password tem de ter pelo menos 6 caracteres.</div>`;
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="codicon codicon-loading codicon-modifier-spin"></i> A criar conta...';

            try {
                const response = await fetch(`${API_URL}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, phone: phone || null })
                });

                const data = await response.json();

                if (response.ok) {
                    // Auto-login
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    alertContainer.innerHTML = `<div class="alert alert-success">Conta criada! A redirecionar...</div>`;
                    setTimeout(() => {
                        window.location.href = 'user-dashboard.html';
                    }, 800);
                } else {
                    alertContainer.innerHTML = `<div class="alert alert-danger">${data.error || 'Erro ao criar conta'}</div>`;
                    btn.disabled = false;
                    btn.innerHTML = '<i class="codicon codicon-person-add"></i> Criar Conta';
                }
            } catch (error) {
                alertContainer.innerHTML = `<div class="alert alert-danger">Erro de conexão. Tente novamente.</div>`;
                btn.disabled = false;
                btn.innerHTML = '<i class="codicon codicon-person-add"></i> Criar Conta';
            }
        });
    </script>
</body>
</html>
